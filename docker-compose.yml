services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-taskdb}
      POSTGRES_USER: ${DB_USER:-taskuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT_EXTERNAL:-5000}:${FLASK_PORT:-8000}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FLASK_PORT: ${FLASK_PORT:-8000}
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-False}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-3000}:${FRONTEND_PORT:-8080}"
    environment:
      REACT_APP_API_URL: ${FRONTEND_API_URL:-http://localhost:5000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:

